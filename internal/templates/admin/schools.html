<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-chalkboard-user"></i> {{.Title}}</h1>
            <p class="subtitle">Управление образовательной платформой</p>
        </div>
    
        <nav>
            <a href="/admin/dashboard">Главная</a>
            <a href="/admin/schools">Школы</a>
            <a href="/admin/classes">Классы</a>
            <a href="/admin/users">Пользователи</a>
            <a href="/admin/equation-types">Типы уравнений</a>
            <a href="/">На сайт</a>
            <a href="/logout">Выход</a>
        </nav>
    
        <p><a href="/admin/schools/new" class="btn btn-primary">+ Добавить школу</a></p>
    
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Название</th>
                    <th>Адрес</th>
                    <th>Телефон</th>
                    <th>Email</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                {{range .Schools}}
                <tr>
                    <td>{{.ID}}</td>
                    <td>{{.Name}}</td>
                    <td>{{.Address}}</td>
                    <td>{{.Phone}}</td>
                    <td>{{.Email}}</td>
                    <td class="actions">
                        <a href="/admin/schools/edit?id={{.ID}}" class="btn">Редактировать</a>
                        <form action="/admin/schools/delete" method="POST" onsubmit="return confirm('Удалить школу?');">
                            <input type="hidden" name="id" value="{{.ID}}">
                            <button type="submit" class="btn btn-danger">Удалить</button>
                        </form>
                    </td>
                </tr>
                {{else}}
                <tr>
                    <td colspan="6">Школ не найдено</td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </div>
</body>
</html>
